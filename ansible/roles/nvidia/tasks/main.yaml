---

- name: Check for installed packages
  ansible.builtin.package_facts:
    manager:
      - apt
  register: packages
  tags:
    - nvidia

- name: Set up nvidia apt sources
  become: true
  become_user: "{{ su_user }}"
  vars:
    nvidia_packages:  # FIXME : There's some var duplication here.
      - nvidia-driver-libs:i386
      - linux-headers-amd64
      - nvidia-driver
  tags:
    - nvidia
  when: "nvidia_packages is not subset(ansible_facts['packages'].keys())"
  block:
    # This can vary between images and 'real' installs, so...
    #   a) Find wherever the debian sources file is
    #   b) Delete it
    #   c) Populate a managed one.
    #
    - name: Find debian source file
      debugger: 'always'
      ansible.builtin.find:
        paths:
          - /etc/apt/
        contains: "deb http://deb.debian.org/debian/"
        read_whole_file: true
      register: result
      # failed_when: "result.files | length == 0"




