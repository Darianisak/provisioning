# FIXME : There's an undeclared dependency here on the apt
#         source being setup.
- name: Set up i386 nVidia drivers
  become: true
  become_user: "{{ su_user }}"
  vars:
    i386_packages:
      - nvidia-driver-libs:i386
  tags:
    - nvidia
  when: "i386_packages is not subset(ansible_facts['packages'].keys())"
  block:
    - name: Get current architectures
      ansible.builtin.command:
        cmd: dpkg --print-foreign-architectures
      changed_when: false  # idempotent
      register: arch

    - name: Add i386 as a valid architecture
      ansible.builtin.command:
        cmd: dpkg --add-architecture i386
      changed_when: "result._result.rc == 0"
      when: "'i386' not in arch.stdout_lines"

    - name: Install i386 packages
      ansible.builtin.apt:
        update_cache: true
        name:
          - "{{ item }}"
      with_items: "{{ i386_packages | difference(packages['ansible_facts']['packages'].keys()) }}"

